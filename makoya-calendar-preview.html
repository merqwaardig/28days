<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#d946ef">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="MAKOYA">
  <title>MAKOYA Calendar</title>
  <link rel="icon" type="image/png" href="/assets/fav.png">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/assets/fav.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: 'Courier New', monospace;
      padding: 20px;
      min-height: 100vh;
      background-color: #130E24;
      background-image: linear-gradient(135deg, rgba(10, 14, 39, 0.7) 0%, rgba(26, 26, 63, 0.7) 50%, rgba(13, 10, 32, 0.7) 100%), url('assets/bg.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
    }
    .container { max-width: 900px; margin: 0 auto; padding-top: 70px; }
    .controls { margin-bottom: 20px; text-align: center; display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; }
    .day-btn { 
      padding: 6px 12px; border: 1px solid #ccc; background: #fff; cursor: pointer; 
      font-family: 'Courier New', monospace; font-size: 12px; border-radius: 4px; 
      transition: all 0.2s; flex: 0 0 auto; color: #000;
    }
    .day-btn:hover { background: #f0f0f0; }
    .day-btn.active { 
      background: var(--day-color);
      color: #fff; 
      border-color: var(--day-color); 
      font-weight: 600;
    }

    .card-wrapper {
      perspective: 1200px;
      cursor: pointer;
      margin-bottom: 20px;
      transition: height 0.6s ease;
    }

    .card-wrapper.front {
      height: 200px;
    }

    .card-wrapper.back {
      height: 560px;
    }

    .card {
      width: 100%; height: 100%;
      border-radius: 16px;
      padding: 28px;
      color: #fff;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
      position: relative;
      transition: transform 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
      transform-style: preserve-3d;
    }

    .card.flipped {
      transform: rotateY(180deg);
    }

    .card-front, .card-back {
      backface-visibility: hidden;
      width: 100%;
    }

    .card-back {
      transform: rotateY(180deg);
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      padding: 28px;
      overflow: hidden;
    }

    .card-front {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
    }

    .card-text {
      flex: 1;
      font-size: 18px;
      line-height: 1.6;
    }
    .card-text .title-line {
      font-size: 21px;
      font-weight: 600;
    }
    .card-text .chakra-line {
      display: block;
      margin-top: -10px;
      font-weight: 600;
    }

    .card-icon-wrapper {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }

    .card-icon {
      width: 72px;
      height: 72px;
      display: flex;
      align-items: center;
      justify-content: center;
      filter: drop-shadow(0 2px 8px rgba(0,0,0,0.2));
    }

    .card-icon svg {
      width: 100%;
      height: 100%;
    }

    .arrow { font-size: 24px; opacity: 0.7; }

    .back-content { font-size: 16px; line-height: 1.6; }
    .back-header { margin-bottom: 14px; padding-bottom: 10px; border-bottom: 1px solid rgba(255,255,255,0.2); }
    .back-title { font-size: 25px; margin-bottom: 0px; font-weight: 700; line-height: 1.1; }
    .back-subtitle { font-size: 17px; color: rgba(255,255,255,0.75); margin-top: -2px; }

    .essence, .aspects, .insights { margin-bottom: 10px; font-size: 16px; }
    .insights { margin-bottom: 24px; }
    
    .balance-section {
      display: grid;
      grid-template-columns: 1fr 1px 1fr;
      gap: 16px;
      margin-bottom: 10px;
    }
    
    .section-col { }
    .section-title { font-size: 20px; text-transform: uppercase; margin-bottom: 10px; font-weight: 700; letter-spacing: 0.5px; }
    .section-label { font-size: 15px; margin-top: 6px; margin-bottom: 3px; font-weight: 700; color: #fff; }
    .section-label:first-child { margin-top: 0; }
    .section-item { font-size: 15px; margin-left: 10px; line-height: 18px; color: rgba(255,255,255,0.85); }
    .divider { background: rgba(255,255,255,0.15); }

    @media (max-width: 768px) {
      body { padding: 14px; }
      .card-wrapper.front { height: 170px; }
      .card-wrapper.back { height: 540px; }
      .card { padding: 20px; gap: 12px; }
      .card-back { padding: 20px; }
      .card-text { font-size: 16px; line-height: 1.5; }
      .card-icon { width: 56px; height: 56px; }
      .arrow { font-size: 18px; }
      .back-content { font-size: 14px; }
      .back-title { font-size: 21px; }
      .back-subtitle { font-size: 16px; }
      .section-item { font-size: 14px; }
      .section-label { font-size: 14px; }
      .section-title { font-size: 14px; }
      .essence, .aspects, .insights { font-size: 14px; }
    }

    @media (max-width: 480px) {
      .card-wrapper.front { height: 150px; }
      .card-wrapper.back { height: 520px; }
      .card { padding: 16px; gap: 8px; }
      .card-back { padding: 16px; }
      .card-text { font-size: 14px; }
      .card-icon { width: 48px; height: 48px; }
      .arrow { font-size: 16px; }
      .controls { margin-bottom: 14px; }
      .day-btn { padding: 5px 10px; font-size: 11px; }
    }

    .month-calendar {
      margin-top: 40px;
      padding: 20px;
      border: 1px solid #ffffff;
      border-radius: 8px;
      background: rgba(19, 14, 36, 0.6);
      backdrop-filter: blur(10px);
    }

    .calendar-header {
      text-align: center;
      color: #fff;
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 20px;
      border-bottom: 1px solid #ffffff;
      padding-bottom: 12px;
    }

    .weekday-names {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 1px;
      margin-bottom: 1px;
      background: #ffffff;
      padding: 1px;
    }

    .weekday-name {
      background: rgba(19, 14, 36, 0.8);
      color: #ffffff;
      text-align: center;
      padding: 8px 4px;
      font-size: 12px;
      font-weight: 600;
      border: 1px solid #ffffff;
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 0;
      background: #ffffff;
      padding: 0;
      border: 1px solid #ffffff;
    }

    .calendar-day {
      background: rgba(19, 14, 36, 0.8);
      color: #ffffff;
      aspect-ratio: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border: 1px solid #ffffff;
      font-size: 14px;
      font-weight: 500;
      position: relative;
      padding: 4px;
      box-sizing: border-box;
    }

    .calendar-day.empty {
      background: #100D25;
      border: 1px solid #ffffff;
      color: transparent;
    }

    .calendar-day .day-number {
      position: relative;
      z-index: 2;
    }

    .chakra-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      position: absolute;
      bottom: 3px;
      right: 3px;
      box-shadow: 0 0 4px rgba(255, 255, 255, 0.3);
    }

    @media (max-width: 768px) {
      .month-calendar {
        margin-top: 30px;
        padding: 16px;
      }

      .calendar-header {
        font-size: 16px;
        margin-bottom: 16px;
      }

      .weekday-name {
        padding: 6px 2px;
        font-size: 11px;
      }

      .calendar-day {
        font-size: 12px;
        padding: 2px;
      }

      .chakra-dot {
        width: 5px;
        height: 5px;
      }
    }

    @media (max-width: 480px) {
      .month-calendar {
        margin-top: 24px;
        padding: 12px;
      }

      .calendar-header {
        font-size: 14px;
        margin-bottom: 12px;
      }

      .weekday-name {
        padding: 4px 2px;
        font-size: 10px;
      }

      .calendar-day {
        font-size: 11px;
        padding: 1px;
      }

      .chakra-dot {
        width: 4px;
        height: 4px;
        bottom: 2px;
        right: 2px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="controls" id="dayButtons"></div>
    
    <div class="card-wrapper" id="cardWrapper">
      <div class="card" id="card">
        <div class="card-front" id="cardFront">
          <div class="card-text" id="frontText"></div>
          <div class="card-icon-wrapper">
            <div class="card-icon" id="cardIcon"></div>
            <div class="arrow">›</div>
          </div>
        </div>
        <div class="card-back" id="cardBack">
          <div class="back-content" id="backContent"></div>
        </div>
      </div>
    </div>

    <div class="month-calendar">
      <div class="calendar-header" id="calendarHeader"></div>
      <div class="weekday-names">
        <div class="weekday-name">Sun</div>
        <div class="weekday-name">Mon</div>
        <div class="weekday-name">Tue</div>
        <div class="weekday-name">Wed</div>
        <div class="weekday-name">Thu</div>
        <div class="weekday-name">Fri</div>
        <div class="weekday-name">Sat</div>
      </div>
      <div class="calendar-grid" id="calendarGrid"></div>
    </div>
  </div>

      6: '<svg width="48px" height="48px" viewBox="0 0 48 48" version="1.1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"> <title>6e - rond</title> <g id="Page-1" stroke="none" stroke-width="1" fill="none" fill-rule="evenodd"> <g id="iconen-copy" transform="translate(-313, 0)" fill-rule="nonzero"> <g id="6e---rond" transform="translate(313, 0)"> <circle id="Root-Copy" fill="#384087" cx="24" cy="24" r="24"></circle> <circle id="7e-copy" stroke="#FFFFFF" stroke-width="2" cx="24" cy="24" r="18.7826087"></circle> <circle id="7e-copy-2" stroke="#FFFFFF" stroke-width="2" cx="24" cy="24" r="7.30434783"></circle> </g> </g> </g> </svg>',

    };

    const weekdays = [
      { name: 'Tuesday', chakraN: 1, chakra: 'Root', color: '#BD151B' },
      { name: 'Monday', chakraN: 2, chakra: 'Sacral', color: '#F35822' },
      { name: 'Sunday', chakraN: 3, chakra: 'Solar Plexus', color: '#F3B512' },
      { name: 'Friday', chakraN: 4, chakra: 'Heart', color: '#429153' },
      { name: 'Wednesday', chakraN: 5, chakra: 'Throat', color: '#2E6AAC' },
      { name: 'Thursday', chakraN: 6, chakra: 'Third Eye', color: '#384087' },
      { name: 'Saturday', chakraN: 7, chakra: 'Crown', color: '#600B4C' },
    ];

    const planetary = {
      'Sun': { ess: 'Life force · Leadership · Self-expression', asp: 'Transformation | Manifestation | Authenticity', ins: 'Action - Creation - Power', bP: ['Good circulation', 'Strong immune', 'Vital energy'], bM: ['Confidence', 'Clarity', 'Authentic'], iP: ['Cannot relax', 'Low energy', 'Too much energy'], iM: ['Ego issues', 'Self-doubt', 'Boundaries'] },
      'Moon': { ess: 'Creativity · Passion · Emotions', asp: 'Femininity | Sensuality | Flow', ins: 'Feeling - Connection - Flexibility', bP: ['Healthy hormones', 'PMS relief', 'Bladder ok'], bM: ['Unblocked creativity', 'Letting go', 'Abundance'], iP: ['Lower body pain', 'PMS', 'Blocked flow'], iM: ['Blocked creativity', 'Fear', 'Resistance'] },
      'Mars': { ess: 'Strength · Vitality · Courage', asp: 'Stability | Structure | Foundation', ins: 'Action - Discipline - Basis', bP: ['Hip healthy', 'Good legs', 'Circulation ok'], bM: ['Courage', 'Clarity', 'Grounded'], iP: ['Hip pain', 'Poor legs', 'Poor circulation'], iM: ['Fear', 'Uncertainty', 'Ungrounded'] },
      'Mercury': { ess: 'Communication · Creativity · Expression', asp: 'Intellect | Speech | Clarity', ins: 'Clarity - Truth - Expression', bP: ['Jaw healthy', 'Hearing clear', 'Throat ok'], bM: ['Formulate', 'Expressing', 'Clear'], iP: ['Jaw problems', 'Hearing loss', 'Throat'], iM: ['Difficulty', 'Anxiety', 'Blocked'] },
      'Jupiter': { ess: 'Spiritual · Cosmic · Consciousness', asp: 'Pure energy | Illumination | Unity', ins: 'Expansion - Wisdom - Knowledge', bP: ['Migraine gone', 'Sleep ok', 'Awake'], bM: ['Clarity', 'Arrogance gone', 'Clear'], iP: ['Migraine', 'Sleep problems', 'Drowsy'], iM: ['Confusion', 'Arrogance', 'Chaos'] },
      'Venus': { ess: 'Harmony · Love · Openness', asp: 'Relationships | Beauty | Fulfillment', ins: 'Freedom - Space - Love', bP: ['Heart healthy', 'Circulation', 'Energy'], bM: ['Trust', 'Forgive', 'Grateful'], iP: ['Heart problems', 'Poor circulation', 'Low energy'], iM: ['Distrust', 'Cannot forgive', 'Ungrateful'] },
      'Saturn': { ess: 'Consciousness · Wisdom · Intuition', asp: 'Visualization | Awareness | Perception', ins: 'Insight - Discipline - Growth', bP: ['Pineal active', 'Sleep ok', 'Eyes clear'], bM: ['Formulate', 'Ease', 'Confident'], iP: ['Pineal issues', 'Sleep problems', 'Eye problems'], iM: ['Difficulty', 'Anxiety', 'Blocked'] },
    };

    const celestial = ['Mars', 'Moon', 'Sun', 'Venus', 'Mercury', 'Jupiter', 'Saturn'];
    // weekdays index: 0=Tuesday(Mars), 1=Monday(Moon), 2=Sunday(Sun), 3=Friday(Venus), 4=Wednesday(Mercury), 5=Thursday(Jupiter), 6=Saturday(Saturn)
    const days = [
      { ...weekdays[6], date: 'Saturday – 16 mei', dayOfX: 'Day of Saturn' },
      { ...weekdays[2], date: 'Sunday – 17 mei', dayOfX: 'Day of the Sun' },
      { ...weekdays[1], date: 'Monday – 18 mei', dayOfX: 'Day of the Moon' },
      { ...weekdays[0], date: 'Tuesday – 19 mei', dayOfX: 'Day of Mars' },
      { ...weekdays[4], date: 'Wednesday – 20 mei', dayOfX: 'Day of Mercury' },
      { ...weekdays[5], date: 'Thursday – 21 mei', dayOfX: 'Day of Jupiter' },
      { ...weekdays[3], date: 'Friday – 22 mei', dayOfX: 'Day of Venus' },
    ];

    let idx = new Date().getDay(); // 0=Sunday, 1=Monday, etc
    // Adjust because our days array starts with Saturday(6), Sunday(2), Monday(1)...
    // Map: 0=Sunday→1, 1=Monday→2, 2=Tuesday→3, 3=Wednesday→4, 4=Thursday→5, 5=Friday→6, 6=Saturday→0
    const dayMap = [1, 2, 3, 4, 5, 6, 0];
    idx = dayMap[idx];
    let flipped = false;

    function darkenColor(hex, factor = 0.7) {
      const num = parseInt(hex.replace('#', ''), 16);
      const r = Math.floor((num >> 16) * factor);
      const g = Math.floor(((num >> 8) & 0xFF) * factor);
      const b = Math.floor((num & 0xFF) * factor);
      return '#' + [r, g, b].map(x => x.toString(16).padStart(2, '0')).join('');
    }

    function render() {
      const d = days[idx];
      const body = celestial[d.chakraN - 1];
      const p = planetary[body];
      const card = document.getElementById('card');
      const wrapper = document.getElementById('cardWrapper');

      // Set CSS variable for day color
      document.documentElement.style.setProperty('--day-color', d.color);

      document.getElementById('cardIcon').innerHTML = svgs[d.chakraN];
      document.getElementById('cardIcon').style.color = d.color;

      if (!flipped) {
        wrapper.classList.remove('back');
        wrapper.classList.add('front');
        card.style.background = d.color;
        card.classList.remove('flipped');
        document.getElementById('frontText').innerHTML = `<span class="title-line">${d.date}</span><br>Day of ${body}<br><br><span class="chakra-line">${d.chakraN}e Chakra – ${d.chakra}</span>`;
      } else {
        wrapper.classList.remove('front');
        wrapper.classList.add('back');
        card.style.background = darkenColor(d.color);
        card.classList.add('flipped');
        let html = `<div class="back-header"><div class="back-title">${d.name}</div><div class="back-subtitle">${body} · ${d.chakra}</div></div>`;
        html += `<div class="essence"><strong>Essence</strong><br>${p.ess}</div>`;
        html += `<div class="aspects"><strong>Aspects</strong><br>${p.asp}</div>`;
        html += `<div class="insights"><strong>Insights</strong><br>${p.ins}</div>`;
        html += `<div class="balance-section"><div class="section-col"><div class="section-title">BALANCE</div><div class="section-label">Physical</div>`;
        p.bP.forEach(item => { html += `<div class="section-item">• ${item}</div>`; });
        html += `<div class="section-label">Mental</div>`;
        p.bM.forEach(item => { html += `<div class="section-item">• ${item}</div>`; });
        html += `</div><div class="divider"></div><div class="section-col"><div class="section-title">IMBALANCE</div><div class="section-label">Physical</div>`;
        p.iP.forEach(item => { html += `<div class="section-item">• ${item}</div>`; });
        html += `<div class="section-label">Mental</div>`;
        p.iM.forEach(item => { html += `<div class="section-item">• ${item}</div>`; });
        html += `</div></div>`;
        document.getElementById('backContent').innerHTML = html;
      }
    }

    document.getElementById('cardWrapper').addEventListener('click', function() {
      flipped = !flipped;
      render();
    });

    const btnContainer = document.getElementById('dayButtons');
    days.forEach((d, i) => {
      const btn = document.createElement('button');
      btn.className = 'day-btn' + (i === idx ? ' active' : '');
      btn.textContent = d.name.slice(0, 3);
      btn.style.setProperty('--day-color', d.color);
      btn.onclick = function() {
        document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        idx = i;
        flipped = false;
        render();
      };
      btnContainer.appendChild(btn);
    });

    render();

    // Month calendar rendering
    const chakraColorMap = [
      '#F3B512', // Sunday
      '#F35822', // Monday
      '#BD151B', // Tuesday
      '#2E6AAC', // Wednesday
      '#384087', // Thursday
      '#429153', // Friday
      '#600B4C'  // Saturday
    ];

    function renderMonthCalendar() {
      const now = new Date();
      const year = now.getFullYear();
      const month = now.getMonth();
      const today = now.getDate();
      const monthName = now.toLocaleString('default', { month: 'long', year: 'numeric' });

      // Get first day of month and number of days
      const firstDay = new Date(year, month, 1).getDay();
      const daysInMonth = new Date(year, month + 1, 0).getDate();

      // Set header
      document.getElementById('calendarHeader').textContent = monthName;

      // Create calendar grid
      const grid = document.getElementById('calendarGrid');
      grid.innerHTML = '';

      // Add empty cells before first day
      for (let i = 0; i < firstDay; i++) {
        const emptyCell = document.createElement('div');
        emptyCell.className = 'calendar-day empty';
        grid.appendChild(emptyCell);
      }

      // Add day cells
      for (let day = 1; day <= daysInMonth; day++) {
        const dayCell = document.createElement('div');
        dayCell.className = 'calendar-day';

        // Calculate which day of week this is (0=Sunday, 6=Saturday)
        const dayOfWeek = (firstDay + day - 1) % 7;
        const chakraColor = chakraColorMap[dayOfWeek];

        // Check if this is today
        const isToday = day === today;

        if (isToday) {
          // Today: full chakra color background
          dayCell.style.backgroundColor = chakraColor;
        } else {
          // Other days: dark background with chakra dot
          dayCell.style.backgroundColor = '#100D25';
        }

        // Create day number
        const dayNumber = document.createElement('span');
        dayNumber.className = 'day-number';
        dayNumber.textContent = day;

        dayCell.appendChild(dayNumber);

        // Add chakra dot for non-today days
        if (!isToday) {
          const dot = document.createElement('div');
          dot.className = 'chakra-dot';
          dot.style.backgroundColor = chakraColor;
          dayCell.appendChild(dot);
        }

        grid.appendChild(dayCell);
      }

      // Add empty cells after last day of month to complete the grid
      const totalCells = firstDay + daysInMonth;
      const remainingCells = (7 - (totalCells % 7)) % 7;
      for (let i = 0; i < remainingCells; i++) {
        const emptyCell = document.createElement('div');
        emptyCell.className = 'calendar-day empty';
        grid.appendChild(emptyCell);
      }
    }

    renderMonthCalendar();

    function setBackgroundHeight() {
      const vh = window.innerHeight * 0.01;
      document.documentElement.style.setProperty('--vh', vh + 'px');
    }

    setBackgroundHeight();
    window.addEventListener('resize', setBackgroundHeight);
    window.addEventListener('orientationchange', setBackgroundHeight);
  </script>
